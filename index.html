<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feuille de Temps</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', Arial, sans-serif;
      background: #111827;
      font-size: 13px;
    }

    /* ── TOOLBAR ── */
    #toolbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 50px;
      background: #0f172a;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 6px;
      z-index: 1000;
    }

    .t-brand {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.4px;
      text-transform: uppercase;
      color: #475569;
      margin-right: 14px;
      white-space: nowrap;
    }

    .t-sep { width: 1px; height: 20px; background: #1e293b; margin: 0 6px; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      height: 32px;
      padding: 0 15px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      font-family: 'Inter', Arial, sans-serif;
      letter-spacing: 0.3px;
      white-space: nowrap;
      transition: filter 0.15s, transform 0.1s;
    }
    .btn:hover  { filter: brightness(1.14); }
    .btn:active { transform: scale(0.96); }

    .btn-add  { background: #3b82f6; color: #fff; }
    .btn-pdf  { background: #ef4444; color: #fff; }
    .btn-docx { background: #16a34a; color: #fff; }
    .btn-new  { background: transparent; color: #475569; border: 1px solid #1e293b; }
    .btn-new:hover { color: #64748b; border-color: #334155; filter: none; }

    .t-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }

    #save-status {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.3px;
      color: #1e293b;
      transition: color 0.4s;
      white-space: nowrap;
    }
    #save-status.on { color: #22c55e; }

    /* ── DOC WRAPPER ── */
    #doc-wrapper {
      margin-top: 50px;
      min-height: calc(100vh - 50px);
      padding: 40px 20px 60px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    /* ── DOCUMENT A4 ── */
    #doc {
      width: 210mm;
      min-height: 297mm;
      background: #fff;
      padding: 20mm 22mm 20mm 22mm;
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.04),
        0 4px 8px rgba(0,0,0,0.08),
        0 24px 64px rgba(0,0,0,0.24);
    }

    /* ── HEADER ── */
    .header-section {
      margin-bottom: 18px;
      padding-bottom: 14px;
      border-bottom: 1px solid #e2e8f0;
    }

    .header-row {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 2px 6px;
      margin-bottom: 6px;
      font-size: 11pt;
      font-weight: 600;
    }
    .header-row:last-child { margin-bottom: 0; }

    .lbl { white-space: nowrap; color: #1e293b; }

    .field {
      border: none;
      outline: none;
      font-family: inherit;
      font-size: 11pt;
      font-weight: 600;
      color: #0f172a;
      padding: 1px 3px;
      background: transparent;
      border-bottom: 1.5px solid transparent;
      transition: border-color 0.2s;
      min-width: 60px;
    }
    .field:hover { border-bottom-color: #e2e8f0; }
    .field:focus { border-bottom-color: #3b82f6; }
    .field::placeholder { color: #d1d5db; font-weight: 400; font-style: italic; }

    .f-nom    { flex: 1;   min-width: 140px; }
    .f-poste  { flex: 1.5; min-width: 180px; }
    .f-heures { width: 60px; }
    .f-jours  { width: 88px; }
    .f-mois   { width: 126px; }

    /* ── TABLE CONTAINER ── */
    .table-wrap {
      border: 1px solid #c8d0db;
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 28px;
    }

    #task-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 10.5pt;
    }

    #task-table thead th {
      padding: 9px 12px;
      text-align: left;
      background: #f1f5f9;
      font-weight: 600;
      font-size: 9pt;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      color: #475569;
      border-bottom: 2px solid #334155;
    }
    #task-table thead th:first-child { width: 112px; border-right: 1px solid #c8d0db; }
    #task-table thead th:last-child  { width: 36px; background: transparent; border-bottom-color: transparent; }

    .task-row td {
      border-bottom: 1px solid #edf0f4;
      padding: 0;
      vertical-align: top;
    }
    .task-row td:first-child { border-right: 1px solid #edf0f4; }
    .task-row td:last-child  { border: none; border-bottom: 1px solid #edf0f4; width: 36px; vertical-align: middle; text-align: center; padding: 0 4px; }
    .task-row:last-child td  { border-bottom: none; }
    .task-row:last-child td:last-child { border-bottom: none; }

    .task-row { transition: background 0.1s; }
    .task-row:hover { background: #f8fafc; }

    .date-input {
      width: 100%;
      border: none;
      outline: none;
      padding: 7px 12px;
      font-family: inherit;
      font-size: 10.5pt;
      background: transparent;
      color: #1e293b;
    }

    .desc-cell {
      min-height: 34px;
      padding: 7px 12px;
      outline: none;
      font-family: inherit;
      font-size: 10.5pt;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
      color: #1e293b;
    }
    .desc-cell:empty::before {
      content: attr(data-ph);
      color: #d1d5db;
      pointer-events: none;
      font-style: italic;
    }

    .del-btn {
      background: none;
      border: none;
      color: #94a3b8;
      font-size: 17px;
      cursor: pointer;
      width: 28px;
      height: 28px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: inherit;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s, background 0.15s;
    }
    .task-row:hover .del-btn { opacity: 1; }
    .del-btn:hover { color: #ef4444; background: #fff1f2; }

    /* ── ADD ROW ── */
    #add-row-btn {
      display: block;
      width: 100%;
      padding: 9px;
      border: none;
      border-top: 1px solid #edf0f4;
      background: none;
      cursor: pointer;
      color: #94a3b8;
      font-size: 11.5px;
      font-family: 'Inter', Arial, sans-serif;
      font-weight: 500;
      letter-spacing: 0.3px;
      text-align: center;
      transition: color 0.2s, background 0.2s;
    }
    #add-row-btn:hover { color: #3b82f6; background: #f0f7ff; }

    /* ── SIGNATURES ── */
    .sig-section {
      display: flex;
      justify-content: space-between;
      margin-top: 36px;
      font-size: 10.5pt;
    }

    .sig-block { width: 40%; }

    .sig-title {
      font-weight: 600;
      color: #374151;
      margin-bottom: 48px;
      font-size: 10.5pt;
    }

    .sig-line {
      height: 1px;
      background: #94a3b8;
      margin-bottom: 7px;
    }

    .sig-name {
      border: none;
      outline: none;
      font-family: inherit;
      font-size: 10.5pt;
      font-weight: 500;
      width: 100%;
      padding: 2px 0;
      background: transparent;
      color: #1e293b;
    }
    .sig-name::placeholder { color: #d1d5db; font-weight: 400; font-style: italic; }

    /* ── NOTIFICATION ── */
    #notif {
      position: fixed;
      bottom: 24px; right: 24px;
      background: #1e293b;
      color: #f1f5f9;
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 500;
      border: 1px solid #334155;
      letter-spacing: 0.2px;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      z-index: 2000;
    }
    #notif.show { opacity: 1; transform: translateY(0); }

    /* ── PRINT ── */
    @media print {
      #toolbar, .del-btn { display: none !important; }

      body { background: #fff; font-family: Arial, sans-serif; }

      #doc-wrapper { margin: 0; padding: 0; min-height: auto; }

      #doc {
        width: 100%;
        box-shadow: none;
        padding: 10mm 16mm;
        min-height: auto;
      }

      .header-section { border-bottom: 1px solid #ccc; }

      input {
        border: none !important;
        border-bottom: none !important;
        -webkit-appearance: none;
        appearance: none;
      }

      .table-wrap { border: 1px solid #bbb; }

      #task-table thead th {
        border-bottom: 2px solid #333;
        background: #f5f5f5;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      #task-table thead th:first-child { border-right: 1px solid #bbb; }

      .task-row td         { border-bottom: 1px solid #ddd; }
      .task-row td:first-child { border-right: 1px solid #ddd; }
      .task-row:hover      { background: transparent; }
      .task-row:last-child td { border-bottom: none; }

      .task-row td:last-child              { display: none !important; }
      #task-table thead th:last-child      { display: none !important; }

      #add-row-btn { display: none !important; }

      .desc-cell:empty::before { content: ''; }

      .sig-name { border-bottom: none !important; }

      @page { size: A4 portrait; margin: 14mm 18mm; }
    }
  </style>
</head>
<body>

<!-- TOOLBAR -->
<div id="toolbar">
  <span class="t-brand">Feuille de Temps</span>
  <div class="t-sep"></div>
  <button class="btn btn-add"  onclick="addRow()">+ Ajouter une ligne</button>
  <button class="btn btn-pdf"  onclick="exportPDF()">⬇ PDF</button>
  <button class="btn btn-docx" onclick="exportDOCX()">⬇ DOCX</button>
  <div class="t-right">
    <span id="save-status"></span>
    <div class="t-sep"></div>
    <button class="btn btn-new" onclick="newDoc()">Nouveau</button>
  </div>
</div>

<div id="notif"></div>

<!-- DOCUMENT -->
<div id="doc-wrapper"><div id="doc">

  <!-- En-tête ligne 1 : Nom / Poste -->
  <div class="header-section">
    <div class="header-row">
      <span class="lbl">Nom :</span>
      <input type="text" id="f-nom"   class="field f-nom"   placeholder="Nom et prénom">
      <span class="lbl" style="margin-left:16px">Poste :</span>
      <input type="text" id="f-poste" class="field f-poste" placeholder="Poste occupé">
    </div>
    <!-- En-tête ligne 2 : Heures / Jours / Mois -->
    <div class="header-row">
      <span class="lbl">Nbre d'heure/jour :</span>
      <input type="text" id="f-heures" class="field f-heures" placeholder="8H">
      <span class="lbl" style="margin-left:16px">Nombre de jours de travail :</span>
      <input type="text" id="f-jours"  class="field f-jours"  placeholder="22 jours">
      <span class="lbl" style="margin-left:16px">Mois :</span>
      <input type="text" id="f-mois"   class="field f-mois"   placeholder="Novembre 2025">
    </div>
  </div>

  <!-- Tableau des tâches -->
  <div class="table-wrap">
    <table id="task-table">
      <thead>
        <tr>
          <th>Date</th>
          <th>Description des tâches</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="task-body"></tbody>
    </table>
    <button id="add-row-btn" type="button" onclick="addRow()">+ Ajouter une ligne</button>
  </div>

  <!-- Signatures -->
  <div class="sig-section">
    <div class="sig-block">
      <div class="sig-title">Signature de l'ASS RAF</div>
      <div class="sig-line"></div>
      <input type="text" class="sig-name" id="sig-l" placeholder="Nom du signataire">
    </div>
    <div class="sig-block" style="text-align:right">
      <div class="sig-title">Signature la superviseure</div>
      <div class="sig-line"></div>
      <input type="text" class="sig-name" id="sig-r" placeholder="Nom du signataire">
    </div>
  </div>

</div></div>

<!-- Librairies -->
<script src="https://cdn.jsdelivr.net/npm/docx@7.8.2/build/index.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>

<script>
'use strict';

let saveTimer;

document.getElementById('doc').addEventListener('input', () => {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(persist, 800);
});

// ── LIGNES ────────────────────────────────────────────────────
function addRow(date, desc) {
  date = date || '';
  desc = desc || '';

  const tbody = document.getElementById('task-body');
  const tr = document.createElement('tr');
  tr.className = 'task-row';

  const tdDate = document.createElement('td');
  const dateIn = document.createElement('input');
  dateIn.type        = 'text';
  dateIn.className   = 'date-input';
  dateIn.placeholder = 'ex: 03 Novembre';
  dateIn.value       = date;
  // Entrée dans le champ date → focus description
  dateIn.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); descDiv.focus(); }
  });
  tdDate.appendChild(dateIn);

  const tdDesc  = document.createElement('td');
  const descDiv = document.createElement('div');
  descDiv.contentEditable = 'true';
  descDiv.className       = 'desc-cell';
  descDiv.dataset.ph      = 'Description des tâches...';
  if (desc) descDiv.innerText = desc;
  tdDesc.appendChild(descDiv);

  const tdDel  = document.createElement('td');
  const delBtn = document.createElement('button');
  delBtn.className = 'del-btn';
  delBtn.innerHTML = '×';
  delBtn.title     = 'Supprimer';
  delBtn.type      = 'button';
  delBtn.onclick   = () => { tr.remove(); persist(); };
  tdDel.appendChild(delBtn);

  tr.appendChild(tdDate);
  tr.appendChild(tdDesc);
  tr.appendChild(tdDel);
  tbody.appendChild(tr);

  if (!date) dateIn.focus();
}

// ── DONNÉES ───────────────────────────────────────────────────
function getData() {
  const rows = [];
  document.querySelectorAll('.task-row').forEach(tr => {
    rows.push({
      date: tr.querySelector('.date-input').value,
      desc: tr.querySelector('.desc-cell').innerText.trim(),
    });
  });
  return {
    nom:    document.getElementById('f-nom').value,
    poste:  document.getElementById('f-poste').value,
    heures: document.getElementById('f-heures').value,
    jours:  document.getElementById('f-jours').value,
    mois:   document.getElementById('f-mois').value,
    sigL:   document.getElementById('sig-l').value,
    sigR:   document.getElementById('sig-r').value,
    rows,
  };
}

function setData(d) {
  d = d || {};
  document.getElementById('f-nom').value    = d.nom    || '';
  document.getElementById('f-poste').value  = d.poste  || '';
  document.getElementById('f-heures').value = d.heures || '';
  document.getElementById('f-jours').value  = d.jours  || '';
  document.getElementById('f-mois').value   = d.mois   || '';
  document.getElementById('sig-l').value    = d.sigL   || '';
  document.getElementById('sig-r').value    = d.sigR   || '';
  document.getElementById('task-body').innerHTML = '';
  (d.rows || []).forEach(r => addRow(r.date, r.desc));
}

// ── PERSISTANCE ───────────────────────────────────────────────
function persist() {
  try {
    localStorage.setItem('fdt', JSON.stringify(getData()));
    const el = document.getElementById('save-status');
    el.textContent = 'Sauvegardé';
    el.classList.add('on');
    setTimeout(() => { el.textContent = ''; el.classList.remove('on'); }, 2000);
  } catch(e) {
    notify('Erreur de sauvegarde');
  }
}

// ── NOUVEAU ───────────────────────────────────────────────────
function newDoc() {
  if (!confirm('Créer une nouvelle feuille ? Les données seront effacées.')) return;
  localStorage.removeItem('fdt');
  setData({});
  addRow();
}

// ── EXPORT PDF ────────────────────────────────────────────────
function exportPDF() {
  window.print();
}

// ── EXPORT DOCX ───────────────────────────────────────────────
async function exportDOCX() {
  if (typeof window.docx === 'undefined') {
    alert('La librairie DOCX n\'est pas disponible. Vérifiez votre connexion internet.');
    return;
  }

  const d = getData();
  const { Document, Packer, Paragraph, Table, TableRow, TableCell, TextRun, WidthType } = window.docx;

  const boldPara = text => new Paragraph({
    children: [new TextRun({ text, bold: true, size: 22 })]
  });

  const header = [
    boldPara('Nom : ' + d.nom + '     Poste : ' + d.poste),
    boldPara(
      'Nbre d\'heure/jour : ' + d.heures +
      '     Nombre de jours de travail : ' + d.jours +
      '     Mois : ' + d.mois
    ),
    new Paragraph({ text: '' }),
  ];

  const headerRow = new TableRow({
    children: [
      new TableCell({
        width: { size: 20, type: WidthType.PERCENTAGE },
        children: [new Paragraph({ children: [new TextRun({ text: 'Date', bold: true, size: 21 })] })]
      }),
      new TableCell({
        width: { size: 80, type: WidthType.PERCENTAGE },
        children: [new Paragraph({ children: [new TextRun({ text: 'Description des tâches', bold: true, size: 21 })] })]
      }),
    ]
  });

  const dataRows = d.rows.map(r => new TableRow({
    children: [
      new TableCell({
        width: { size: 20, type: WidthType.PERCENTAGE },
        children: [new Paragraph({ children: [new TextRun({ text: r.date, size: 21 })] })]
      }),
      new TableCell({
        width: { size: 80, type: WidthType.PERCENTAGE },
        children: r.desc
          ? r.desc.split('\n').map(line => new Paragraph({ children: [new TextRun({ text: line, size: 21 })] }))
          : [new Paragraph({ text: '' })]
      }),
    ]
  }));

  const taskTable = new Table({
    width: { size: 100, type: WidthType.PERCENTAGE },
    rows: [headerRow, ...dataRows],
  });

  const sigTitle = new Paragraph({
    children: [
      new TextRun({ text: 'Signature de l\'ASS RAF', bold: true, size: 21 }),
      new TextRun({ text: '\t\t\t\t\t', size: 21 }),
      new TextRun({ text: 'Signature la superviseure', bold: true, size: 21 }),
    ]
  });

  const sigNames = new Paragraph({
    children: [
      new TextRun({ text: d.sigL, size: 21 }),
      new TextRun({ text: '\t\t\t\t\t', size: 21 }),
      new TextRun({ text: d.sigR, size: 21 }),
    ]
  });

  const doc = new Document({
    sections: [{
      properties: {
        page: { margin: { top: 1080, bottom: 1080, left: 1134, right: 1134 } }
      },
      children: [
        ...header,
        taskTable,
        new Paragraph({ text: '' }),
        new Paragraph({ text: '' }),
        new Paragraph({ text: '' }),
        sigTitle,
        new Paragraph({ text: '' }),
        sigNames,
      ]
    }]
  });

  try {
    const blob = await Packer.toBlob(doc);
    saveAs(blob, 'feuille-de-temps-' + (d.mois || 'export') + '.docx');
    notify('DOCX exporté ✓');
  } catch(err) {
    console.error(err);
    alert('Erreur DOCX : ' + err.message);
  }
}

// ── NOTIFICATION ──────────────────────────────────────────────
let notifTimer;
function notify(msg) {
  const el = document.getElementById('notif');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(notifTimer);
  notifTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

// ── INIT ──────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem('fdt');
  if (saved) {
    try { setData(JSON.parse(saved)); return; } catch(e) {}
  }
  addRow();
});
</script>
</body>
</html>
